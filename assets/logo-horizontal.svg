<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="frame-fab — Novel-to-Video AI Pipeline">
  <title>frame-fab</title>
  <desc>frame-fab 水平 logo (纯英文版): 图标 + 文字</desc>
  <defs>
    <linearGradient id="brandPrimaryH2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="brandAccentH2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="pulseLineH2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGradH2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- 左侧图标 -->
  <g transform="translate(20 28) scale(0.57)">
    <rect x="16" y="16" width="224" height="224" rx="56" fill="#0B0E2C"/>
    <rect x="42" y="62" width="56" height="132" rx="10" fill="none" stroke="url(#brandPrimaryH2)" stroke-width="5"/>
    <rect x="100" y="50" width="56" height="156" rx="10" fill="none" stroke="url(#brandPrimaryH2)" stroke-width="6"/>
    <rect x="158" y="62" width="56" height="132" rx="10" fill="none" stroke="url(#brandPrimaryH2)" stroke-width="5"/>
    <g fill="#EC4899" opacity="0.7">
      <rect x="52" y="76" width="6" height="6" rx="2"/>
      <rect x="74" y="76" width="6" height="6" rx="2"/>
      <rect x="110" y="64" width="6" height="6" rx="2"/>
      <rect x="132" y="64" width="6" height="6" rx="2"/>
      <rect x="168" y="76" width="6" height="6" rx="2"/>
      <rect x="190" y="76" width="6" height="6" rx="2"/>
    </g>
    <g fill="#EC4899" opacity="0.7">
      <rect x="52" y="174" width="6" height="6" rx="2"/>
      <rect x="74" y="174" width="6" height="6" rx="2"/>
      <rect x="110" y="186" width="6" height="6" rx="2"/>
      <rect x="132" y="186" width="6" height="6" rx="2"/>
      <rect x="168" y="174" width="6" height="6" rx="2"/>
      <rect x="190" y="174" width="6" height="6" rx="2"/>
    </g>
    <g transform="translate(128 128)">
      <circle r="14" fill="url(#brandAccentH2)"/>
      <circle r="6" fill="#FFFFFF"/>
      <g stroke="url(#pulseLineH2)" stroke-width="3" stroke-linecap="round">
        <line x1="-50" y1="0" x2="-20" y2="0"/>
        <line x1="20" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="-50" x2="0" y2="-20"/>
        <line x1="0" y1="20" x2="0" y2="50"/>
      </g>
    </g>
  </g>

  <!-- 右侧文字 (纯英文 + 数字, 通用字体栈) -->
  <g transform="translate(196 0)">
    <text x="0" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="url(#textGradH2)">frame</text>
    <text x="232" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#0B0E2C">·</text>
    <text x="262" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#0B0E2C">fab</text>
    <text x="0" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="500" letter-spacing="3" fill="#6B7280">NOVEL · TO · VIDEO · AI</text>
  </g>
</svg>
