<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="frame-fab">
  <title>frame-fab</title>
  <desc>AI 漫剧创作平台 — 胶片帧 + AI 神经脉冲的视觉锤</desc>
  <defs>
    <!-- 主品牌渐变: 靛蓝紫 → 品红 -->
    <linearGradient id="brandPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <!-- 强调渐变: 活力橙 -->
    <linearGradient id="brandAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <!-- 神经脉冲线 -->
    <linearGradient id="pulseLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </linearGradient>
    <!-- 胶片孔径向高光 -->
    <radialGradient id="frameGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 圆角方底 (16 网格的视觉锤) -->
  <rect x="16" y="16" width="224" height="224" rx="56" fill="#0B0E2C"/>
  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#frameGlow)"/>

  <!-- 胶片帧结构: 三帧 (左中右) -->
  <g>
    <!-- 左帧 -->
    <rect x="42" y="62" width="56" height="132" rx="10" fill="none" stroke="url(#brandPrimary)" stroke-width="5"/>
    <!-- 中帧 (主, 略大) -->
    <rect x="100" y="50" width="56" height="156" rx="10" fill="none" stroke="url(#brandPrimary)" stroke-width="6"/>
    <!-- 右帧 -->
    <rect x="158" y="62" width="56" height="132" rx="10" fill="none" stroke="url(#brandPrimary)" stroke-width="5"/>

    <!-- 胶片孔 (sprocket holes) 顶/底排 -->
    <g fill="#EC4899" opacity="0.7">
      <rect x="52" y="76" width="6" height="6" rx="2"/>
      <rect x="74" y="76" width="6" height="6" rx="2"/>
      <rect x="110" y="64" width="6" height="6" rx="2"/>
      <rect x="132" y="64" width="6" height="6" rx="2"/>
      <rect x="168" y="76" width="6" height="6" rx="2"/>
      <rect x="190" y="76" width="6" height="6" rx="2"/>
    </g>
    <g fill="#EC4899" opacity="0.7">
      <rect x="52" y="174" width="6" height="6" rx="2"/>
      <rect x="74" y="174" width="6" height="6" rx="2"/>
      <rect x="110" y="186" width="6" height="6" rx="2"/>
      <rect x="132" y="186" width="6" height="6" rx="2"/>
      <rect x="168" y="174" width="6" height="6" rx="2"/>
      <rect x="190" y="174" width="6" height="6" rx="2"/>
    </g>
  </g>

  <!-- AI 神经脉冲: 中心点 + 放射线 -->
  <g transform="translate(128 128)">
    <!-- 中心圆点 -->
    <circle r="14" fill="url(#brandAccent)"/>
    <circle r="6" fill="#FFFFFF"/>
    <!-- 4 向脉冲线 -->
    <g stroke="url(#pulseLine)" stroke-width="3" stroke-linecap="round">
      <line x1="-50" y1="0" x2="-20" y2="0"/>
      <line x1="20" y1="0" x2="50" y2="0"/>
      <line x1="0" y1="-50" x2="0" y2="-20"/>
      <line x1="0" y1="20" x2="0" y2="50"/>
    </g>
    <!-- 对角细脉冲 -->
    <g stroke="url(#pulseLine)" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <line x1="-36" y1="-36" x2="-22" y2="-22"/>
      <line x1="36" y1="-36" x2="22" y2="-22"/>
      <line x1="-36" y1="36" x2="-22" y2="22"/>
      <line x1="36" y1="36" x2="22" y2="22"/>
    </g>
  </g>
</svg>
