<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" role="img" aria-label="frame-fab stacked logo">
  <title>frame-fab</title>
  <desc>堆叠式 logo: 顶部图标 + 下方文字</desc>
  <defs>
    <linearGradient id="brandPrimaryS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="brandAccentS" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="textGradS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- 顶部图标 -->
  <g transform="translate(32 16) scale(1.0)">
    <rect x="16" y="16" width="224" height="224" rx="56" fill="#0B0E2C"/>
    <rect x="42" y="62" width="56" height="132" rx="10" fill="none" stroke="url(#brandPrimaryS)" stroke-width="5"/>
    <rect x="100" y="50" width="56" height="156" rx="10" fill="none" stroke="url(#brandPrimaryS)" stroke-width="6"/>
    <rect x="158" y="62" width="56" height="132" rx="10" fill="none" stroke="url(#brandPrimaryS)" stroke-width="5"/>
    <g fill="#EC4899" opacity="0.7">
      <rect x="52" y="76" width="6" height="6" rx="2"/>
      <rect x="74" y="76" width="6" height="6" rx="2"/>
      <rect x="110" y="64" width="6" height="6" rx="2"/>
      <rect x="132" y="64" width="6" height="6" rx="2"/>
      <rect x="168" y="76" width="6" height="6" rx="2"/>
      <rect x="190" y="76" width="6" height="6" rx="2"/>
    </g>
    <g fill="#EC4899" opacity="0.7">
      <rect x="52" y="174" width="6" height="6" rx="2"/>
      <rect x="74" y="174" width="6" height="6" rx="2"/>
      <rect x="110" y="186" width="6" height="6" rx="2"/>
      <rect x="132" y="186" width="6" height="6" rx="2"/>
      <rect x="168" y="174" width="6" height="6" rx="2"/>
      <rect x="190" y="174" width="6" height="6" rx="2"/>
    </g>
    <g transform="translate(128 128)">
      <circle r="14" fill="url(#brandAccentS)"/>
      <circle r="6" fill="#FFFFFF"/>
      <g stroke="url(#textGradS)" stroke-width="3" stroke-linecap="round" opacity="0.7">
        <line x1="-50" y1="0" x2="-20" y2="0"/>
        <line x1="20" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="-50" x2="0" y2="-20"/>
        <line x1="0" y1="20" x2="0" y2="50"/>
      </g>
    </g>
  </g>

  <!-- 下方文字 (居中) -->
  <g transform="translate(160 280)" text-anchor="middle">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="800" letter-spacing="-1">
      <tspan fill="url(#textGradS)">frame</tspan><tspan fill="#0B0E2C">·</tspan><tspan fill="#0B0E2C">fab</tspan>
    </text>
    <text y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#6B7280">AI 漫剧创作平台</text>
  </g>
</svg>
