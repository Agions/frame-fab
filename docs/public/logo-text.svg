<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Panel icon (stylized "P" made of stacked panels) -->
  <g filter="url(#glow)">
    <!-- Back panel -->
    <rect x="8" y="8" width="20" height="16" rx="3" fill="#3B82F6" opacity="0.5"/>
    <!-- Middle panel -->
    <rect x="14" y="14" width="20" height="16" rx="3" fill="#3B82F6" opacity="0.7"/>
    <!-- Front panel -->
    <rect x="20" y="20" width="20" height="16" rx="3" fill="url(#panelGrad)"/>
    <!-- Play indicator on front panel -->
    <path d="M27 26 L33 30 L27 34 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- Text: "Panel" -->
  <text x="52" y="42"
    font-family="'Inter', 'PingFang SC', sans-serif"
    font-size="32"
    font-weight="800"
    fill="url(#logoGrad)">Panel</text>

  <!-- Text: "Flow" -->
  <text x="148" y="42"
    font-family="'Inter', 'PingFang SC', sans-serif"
    font-size="32"
    font-weight="800"
    fill="rgba(241,245,249,0.9)">Flow</text>
</svg>