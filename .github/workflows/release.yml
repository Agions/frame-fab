name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v3.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${TAG#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Update tauri.conf.json version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json
          grep '"version"' src-tauri/tauri.conf.json

      - name: Commit version update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src-tauri/tauri.conf.json
          git commit -m "chore(release): sync version to ${{ steps.version.outputs.version }}" || true

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body: |
            ## Download PanelFlow ${{ steps.version.outputs.version }}

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | Windows | x64 | `PanelFlow_x64-setup.exe` |
            | Windows | ARM64 | `PanelFlow_arm64-setup.exe` |
            | Windows | x64 (MSI) | `PanelFlow_x64_en-US.msi` |
            | macOS | Apple Silicon | `PanelFlow_aarch64.dmg` |
            | macOS | Intel | `PanelFlow_x64.dmg` |
            | Linux | x64 (AppImage) | `PanelFlow_x64.AppImage` |
            | Linux | ARM64 (AppImage) | `PanelFlow_arm64.AppImage` |
            | Linux | x64 (deb) | `PanelFlow_x64.deb` |
            | Linux | ARM64 (deb) | `PanelFlow_arm64.deb` |

            > Full release notes: [CHANGELOG.md](https://github.com/Agions/PanelFlow/blob/${{ steps.version.outputs.tag }}/CHANGELOG.md)
          draft: true
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-x64:
    name: Build Windows x64
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Windows x64)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Rename artifacts
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          if (Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe") {
            Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | ForEach-Object {
              Move-Item $_.FullName "PanelFlow_${VERSION}_x64-setup.exe"
            }
          }
          if (Test-Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi") {
            Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" | ForEach-Object {
              Move-Item $_.FullName "PanelFlow_${VERSION}_x64_en-US.msi"
            }
          }

      - name: Upload Windows x64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: |
            PanelFlow_*.exe
            PanelFlow_*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-arm64:
    name: Build Windows ARM64
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Windows ARM64)
        run: npm run tauri build -- --target aarch64-pc-windows-msvc

      - name: Rename artifacts
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          if (Test-Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe") {
            Get-ChildItem "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe" | ForEach-Object {
              Move-Item $_.FullName "PanelFlow_${VERSION}_arm64-setup.exe"
            }
          }
          if (Test-Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi") {
            Get-ChildItem "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi" | ForEach-Object {
              Move-Item $_.FullName "PanelFlow_${VERSION}_arm64_en-US.msi"
            }
          }

      - name: Upload Windows ARM64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: |
            PanelFlow_*.exe
            PanelFlow_*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: Build macOS Apple Silicon
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (macOS ARM64)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Rename and upload
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" -exec sh -c '
            FILE=$1
            VERSION="$2"
            NEW_NAME="PanelFlow_${VERSION}_aarch64.dmg"
            cp "$FILE" "$NEW_NAME"
          ' _ {} "$VERSION" \;

      - name: Upload macOS ARM64 artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: PanelFlow_*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-x64:
    name: Build macOS Intel
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (macOS x64)
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Rename and upload
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" -exec sh -c '
            FILE=$1
            VERSION="$2"
            NEW_NAME="PanelFlow_${VERSION}_x64.dmg"
            cp "$FILE" "$NEW_NAME"
          ' _ {} "$VERSION" \;

      - name: Upload macOS x64 artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: PanelFlow_*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-x64:
    name: Build Linux x64
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Linux x64)
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu

      - name: Rename and upload
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/"*.AppImage ]; then
            cp "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/"*.AppImage "PanelFlow_${VERSION}_x64.AppImage"
          fi
          if [ -f "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/"*.deb ]; then
            cp "src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/"*.deb "PanelFlow_${VERSION}_x64.deb"
          fi
          ls -la PanelFlow_* 2>/dev/null || true

      - name: Upload Linux x64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: |
            PanelFlow_*.AppImage
            PanelFlow_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    name: Build Linux ARM64
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust cross-compilation toolchain
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (Linux ARM64)
        run: npm run tauri build -- --target aarch64-unknown-linux-gnu

      - name: Rename and upload
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f "src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/"*.AppImage ]; then
            cp "src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/"*.AppImage "PanelFlow_${VERSION}_arm64.AppImage"
          fi
          if [ -f "src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/"*.deb ]; then
            cp "src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/"*.deb "PanelFlow_${VERSION}_arm64.deb"
          fi
          ls -la PanelFlow_* 2>/dev/null || true

      - name: Upload Linux ARM64 artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: |
            PanelFlow_*.AppImage
            PanelFlow_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
