<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="frame-fab social card">
  <title>frame-fab · AI 漫剧创作平台</title>
  <desc>GitHub 社交卡 / Open Graph 分享卡 1280×640 — v2.0 品牌升级版</desc>
  <defs>
    <linearGradient id="ogBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E2C"/>
      <stop offset="50%" stop-color="#1A1A3E"/>
      <stop offset="100%" stop-color="#24243E"/>
    </linearGradient>
    <radialGradient id="ogGlow2a" cx="80%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ogGlow2b" cx="20%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogPrimary2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="ogAccent2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="ogText2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>

  <!-- 背景层 -->
  <rect width="1280" height="640" fill="url(#ogBg2)"/>
  <rect width="1280" height="640" fill="url(#ogGlow2a)"/>
  <rect width="1280" height="640" fill="url(#ogGlow2b)"/>

  <!-- 顶/底胶片孔装饰（v2.0 升级：保留原胶片条带风格） -->
  <g opacity="0.18">
    <rect x="0" y="100" width="1280" height="2" fill="url(#ogPrimary2)"/>
    <rect x="0" y="540" width="1280" height="2" fill="url(#ogPrimary2)"/>
    <g fill="#EC4899">
      <rect x="40" y="86" width="8" height="8" rx="2"/><rect x="100" y="86" width="8" height="8" rx="2"/>
      <rect x="160" y="86" width="8" height="8" rx="2"/><rect x="220" y="86" width="8" height="8" rx="2"/>
      <rect x="280" y="86" width="8" height="8" rx="2"/><rect x="340" y="86" width="8" height="8" rx="2"/>
      <rect x="400" y="86" width="8" height="8" rx="2"/><rect x="460" y="86" width="8" height="8" rx="2"/>
      <rect x="520" y="86" width="8" height="8" rx="2"/><rect x="580" y="86" width="8" height="8" rx="2"/>
      <rect x="640" y="86" width="8" height="8" rx="2"/><rect x="700" y="86" width="8" height="8" rx="2"/>
      <rect x="760" y="86" width="8" height="8" rx="2"/><rect x="820" y="86" width="8" height="8" rx="2"/>
      <rect x="880" y="86" width="8" height="8" rx="2"/><rect x="940" y="86" width="8" height="8" rx="2"/>
      <rect x="1000" y="86" width="8" height="8" rx="2"/><rect x="1060" y="86" width="8" height="8" rx="2"/>
      <rect x="1120" y="86" width="8" height="8" rx="2"/><rect x="1180" y="86" width="8" height="8" rx="2"/>
    </g>
    <g fill="#EC4899">
      <rect x="40" y="546" width="8" height="8" rx="2"/><rect x="100" y="546" width="8" height="8" rx="2"/>
      <rect x="160" y="546" width="8" height="8" rx="2"/><rect x="220" y="546" width="8" height="8" rx="2"/>
      <rect x="280" y="546" width="8" height="8" rx="2"/><rect x="340" y="546" width="8" height="8" rx="2"/>
      <rect x="400" y="546" width="8" height="8" rx="2"/><rect x="460" y="546" width="8" height="8" rx="2"/>
      <rect x="520" y="546" width="8" height="8" rx="2"/><rect x="580" y="546" width="8" height="8" rx="2"/>
      <rect x="640" y="546" width="8" height="8" rx="2"/><rect x="700" y="546" width="8" height="8" rx="2"/>
      <rect x="760" y="546" width="8" height="8" rx="2"/><rect x="820" y="546" width="8" height="8" rx="2"/>
      <rect x="880" y="546" width="8" height="8" rx="2"/><rect x="940" y="546" width="8" height="8" rx="2"/>
      <rect x="1000" y="546" width="8" height="8" rx="2"/><rect x="1060" y="546" width="8" height="8" rx="2"/>
      <rect x="1120" y="546" width="8" height="8" rx="2"/><rect x="1180" y="546" width="8" height="8" rx="2"/>
    </g>
  </g>

  <!-- 左侧文字 — 纯 ASCII + 数字,避免字体问题 -->
  <g transform="translate(80 0)">
    <text y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="500" letter-spacing="6" fill="#A5B4FC">v3.0 · OPEN SOURCE · MIT</text>
    <text y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="130" font-weight="800" letter-spacing="-5" fill="url(#ogText2)">frame·fab</text>
    <text y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="500" letter-spacing="1" fill="#C5CAE9">Novel-to-Video AI Pipeline</text>
    <!-- 特性徽章（v2.0 新增） -->
    <g transform="translate(0 495)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600">
      <g>
        <rect x="0" y="0" width="138" height="32" rx="16" fill="rgba(99,102,241,0.15)" stroke="url(#ogPrimary2)" stroke-width="1"/>
        <text x="69" y="22" font-size="15" fill="#A5B4FC" text-anchor="middle" letter-spacing="1">TAURI + RUST</text>
      </g>
      <g transform="translate(150 0)">
        <rect x="0" y="0" width="118" height="32" rx="16" fill="rgba(168,85,247,0.15)" stroke="url(#ogPrimary2)" stroke-width="1"/>
        <text x="59" y="22" font-size="15" fill="#C4B5FD" text-anchor="middle" letter-spacing="1">6+ AI MODELS</text>
      </g>
      <g transform="translate(280 0)">
        <rect x="0" y="0" width="142" height="32" rx="16" fill="rgba(236,72,153,0.15)" stroke="url(#ogPrimary2)" stroke-width="1"/>
        <text x="71" y="22" font-size="15" fill="#F9A8D4" text-anchor="middle" letter-spacing="1">QUALITY GATE</text>
      </g>
      <g transform="translate(434 0)">
        <rect x="0" y="0" width="148" height="32" rx="16" fill="rgba(251,146,60,0.15)" stroke="url(#ogAccent2)" stroke-width="1"/>
        <text x="74" y="22" font-size="15" fill="#FDBA74" text-anchor="middle" letter-spacing="1">CHECKPOINT 30s</text>
      </g>
    </g>
  </g>

  <!-- 右侧大图标（v2.0 升级：左中右三帧胶片条带） -->
  <g transform="translate(820 140) scale(1.5)">
    <rect x="16" y="16" width="224" height="224" rx="56" fill="#0B0E2C" stroke="#1F2937" stroke-width="2"/>
    <radialGradient id="ogIconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <circle cx="128" cy="128" r="120" fill="url(#ogIconGlow)"/>
    <!-- 三帧胶片条带 -->
    <rect x="42"  y="62" width="32" height="132" rx="8" fill="none" stroke="url(#ogPrimary2)" stroke-width="5" opacity="0.55"/>
    <rect x="100" y="50" width="56" height="156" rx="10" fill="none" stroke="url(#ogPrimary2)" stroke-width="6"/>
    <rect x="158" y="62" width="32" height="132" rx="8" fill="none" stroke="url(#ogPrimary2)" stroke-width="5" opacity="0.55"/>
    <!-- 胶片孔点 -->
    <g fill="#EC4899" opacity="0.7">
      <rect x="52" y="76" width="6" height="6" rx="2"/><rect x="74" y="76" width="6" height="6" rx="2"/>
      <rect x="110" y="64" width="6" height="6" rx="2"/><rect x="132" y="64" width="6" height="6" rx="2"/>
      <rect x="168" y="76" width="6" height="6" rx="2"/><rect x="190" y="76" width="6" height="6" rx="2"/>
      <rect x="52" y="174" width="6" height="6" rx="2"/><rect x="74" y="174" width="6" height="6" rx="2"/>
      <rect x="110" y="186" width="6" height="6" rx="2"/><rect x="132" y="186" width="6" height="6" rx="2"/>
      <rect x="168" y="174" width="6" height="6" rx="2"/><rect x="190" y="174" width="6" height="6" rx="2"/>
    </g>
    <!-- 中心三圈光圈 -->
    <g transform="translate(128 128)">
      <circle r="22" fill="url(#ogAccent2)"/>
      <circle r="14" fill="#FFFFFF"/>
      <circle r="6"  fill="url(#ogPrimary2)"/>
      <g stroke="url(#ogPrimary2)" stroke-width="3" stroke-linecap="round" opacity="0.7">
        <line x1="-50" y1="0" x2="-30" y2="0"/><line x1="30" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="-50" x2="0" y2="-30"/><line x1="0" y1="30" x2="0" y2="50"/>
      </g>
    </g>
    <!-- 顶角装饰小点 -->
    <circle cx="48"  cy="48"  r="3" fill="url(#ogPrimary2)" opacity="0.6"/>
    <circle cx="208" cy="48"  r="3" fill="url(#ogPrimary2)" opacity="0.6"/>
    <circle cx="48"  cy="208" r="3" fill="url(#ogPrimary2)" opacity="0.6"/>
    <circle cx="208" cy="208" r="3" fill="url(#ogPrimary2)" opacity="0.6"/>
  </g>

  <!-- 底部信息 -->
  <g transform="translate(80 600)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#9CA3B8">github.com/Agions/frame-fab</text>
  </g>
  <g transform="translate(1140 600)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#9CA3B8" text-anchor="end">v3.0.0 · 2026</text>
  </g>
</svg>
